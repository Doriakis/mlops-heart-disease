name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Run Test Suite
        run: |
          pytest tests/ -v

  train:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Execute Model Training and Threshold Check
        run: |
          python -c "
          from src.train import train_model
          run_id, metrics = train_model()
          print(f'Training complete. F1 Score: {metrics[\"f1_score\"]}')
          if metrics['f1_score'] < 0.75:
              print('Model failed performance threshold (F1 < 0.75)!')
              exit(1)
          "